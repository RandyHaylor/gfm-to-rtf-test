name: Convert README to RTF/DOCX/PDF

on:
  workflow_dispatch:
  push:
    paths:
      - 'README.md'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Convert README
        uses: ./.github/actions/readme-to-rtf

      - name: Configure git
        shell: bash
        run: git config user.name "github-actions[bot]"

      - name: Configure git email
        shell: bash
        run: git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage generated files
        shell: bash
        run: git add *.rtf *.docx *.pdf example-module-with-readme/*.rtf 2>/dev/null || true

      - name: Commit if changed
        shell: bash
        run: 'git diff --cached --quiet || git commit -m "auto-regenerate README documents"'

      - name: Push
        shell: bash
        run: git push
