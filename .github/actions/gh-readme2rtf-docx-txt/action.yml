name: 'gh-readme2rtf-docx-txt'
description: 'Convert GitHub-Flavored Markdown to RTF, DOCX, and TXT based on settings'

inputs:
  config:
    description: 'Path to settings JSON file'
    required: false
    default: 'gh-readme2rtf-docx-txt-settings.json'
  release_tag:
    description: 'Release tag to attach generated files to (empty means no release is active)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install Python dependencies
      shell: bash
      run: pip install pygments pillow

    - name: Convert README files and process release attachments
      shell: python
      env:
        CONFIG_PATH: ${{ inputs.config }}
        ACTION_PATH: ${{ github.action_path }}
        RELEASE_TAG: ${{ inputs.release_tag }}
        GH_TOKEN: ${{ github.token }}
      run: |
        import json
        import os
        import subprocess
        import sys

        config_path_from_env = os.environ['CONFIG_PATH']
        action_directory_from_env = os.environ['ACTION_PATH']
        active_release_tag = os.environ.get('RELEASE_TAG', '').strip()

        converter_script_path = os.path.join(action_directory_from_env, 'gh-readme2rtf-docx-txt.py')
        rtf_image_embedder_script_path = os.path.join(action_directory_from_env, 'rtf_image_embedder.py')

        with open(config_path_from_env) as settings_file_handle:
            settings_data = json.load(settings_file_handle)

        # Separate error buckets so the final summary can distinguish causes.
        missing_input_file_errors = []
        conversion_subprocess_errors = []
        missing_release_errors = []
        release_upload_errors = []

        for file_entry in settings_data.get('files', []):
            input_file_path = file_entry['input']
            entry_is_enabled = file_entry.get('enabled', True)
            if not entry_is_enabled:
                print(f'::notice::Skipping {input_file_path} — entry has enabled=false in settings.')
                continue

            if not os.path.exists(input_file_path):
                missing_input_file_errors.append(
                    f"Input file '{input_file_path}' does not exist. "
                    f"Either set 'enabled': false for this entry in the settings file, "
                    f"remove the entry, or restore the missing file."
                )
                continue

            output_formats_for_entry = file_entry.get('output_formats', ['rtf'])
            attach_this_entry_to_release = file_entry.get('attach_to_release', False)
            base_path_without_extension = input_file_path.rsplit('.', 1)[0]
            produced_output_file_paths = []

            def run_converter_with_failure_tracking(conversion_args_list, produced_path_to_record):
                """Run the converter subprocess; on failure, record the error and return False."""
                try:
                    subprocess.run(conversion_args_list, check=True)
                    produced_output_file_paths.append(produced_path_to_record)
                    return True
                except subprocess.CalledProcessError as subprocess_failure:
                    conversion_subprocess_errors.append(
                        f"Conversion failed for '{input_file_path}' -> '{produced_path_to_record}': "
                        f"exit code {subprocess_failure.returncode}. See log above for details."
                    )
                    return False

            if 'rtf' in output_formats_for_entry:
                rtf_output_path = base_path_without_extension + '.rtf'
                print(f'Converting {input_file_path} -> {rtf_output_path}')
                if run_converter_with_failure_tracking(
                    [sys.executable, converter_script_path, input_file_path, rtf_output_path],
                    rtf_output_path,
                ):
                    # Embed images only when the base conversion succeeded.
                    try:
                        subprocess.run(
                            [sys.executable, rtf_image_embedder_script_path, rtf_output_path],
                            check=True,
                        )
                    except subprocess.CalledProcessError as embedder_failure:
                        conversion_subprocess_errors.append(
                            f"RTF image embedding failed for '{rtf_output_path}': "
                            f"exit code {embedder_failure.returncode}."
                        )

            if 'docx' in output_formats_for_entry:
                docx_output_path = base_path_without_extension + '.docx'
                print(f'Converting {input_file_path} -> {docx_output_path}')
                run_converter_with_failure_tracking(
                    [sys.executable, converter_script_path, input_file_path, docx_output_path],
                    docx_output_path,
                )

            if 'txt' in output_formats_for_entry:
                txt_output_path = base_path_without_extension + '.txt'
                print(f'Converting {input_file_path} -> {txt_output_path}')
                run_converter_with_failure_tracking(
                    [sys.executable, converter_script_path, input_file_path, txt_output_path],
                    txt_output_path,
                )

            if attach_this_entry_to_release:
                if not active_release_tag:
                    missing_release_errors.append(
                        f"attach_to_release=true for '{input_file_path}', but no release tag is active. "
                        f"Create a release (or run this workflow from a 'release: published' event) "
                        f"before expecting release asset uploads."
                    )
                else:
                    for produced_path in produced_output_file_paths:
                        print(f'::notice::Uploading {produced_path} to release {active_release_tag}')
                        try:
                            subprocess.run(
                                ['gh', 'release', 'upload', active_release_tag, produced_path, '--clobber'],
                                check=True,
                            )
                        except subprocess.CalledProcessError as upload_failure:
                            release_upload_errors.append(
                                f"Failed to upload '{produced_path}' to release '{active_release_tag}': "
                                f"exit code {upload_failure.returncode}."
                            )

        all_collected_errors = (
            missing_input_file_errors
            + conversion_subprocess_errors
            + missing_release_errors
            + release_upload_errors
        )
        if all_collected_errors:
            print('::group::Conversion workflow error summary')
            for error_message in all_collected_errors:
                print(f'::error::{error_message}')
            print('::endgroup::')
            print(
                '::error::Some files had errors (see grouped list above). '
                'Files that converted successfully were still committed to the repo; '
                'release assets that uploaded successfully are still present on the release.'
            )
            sys.exit(1)
